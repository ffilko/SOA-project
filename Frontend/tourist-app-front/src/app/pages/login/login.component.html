<h2>Login</h2>

<form (ngSubmit)="login()">

  <input
    [(ngModel)]="credentials.username"
    name="username"
    placeholder="Username"
  />

  <input
    [(ngModel)]="credentials.password"
    name="password"
    type="password"
    placeholder="Password"
  />

  <button type="submit">Login</button>

</form>

<br />

<button routerLink="/register">
  Go to Register
</button>
