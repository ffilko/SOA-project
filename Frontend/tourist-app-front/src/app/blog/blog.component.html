<div *ngIf="blog" style="padding: 16px; max-width: 800px;">
  <h2>{{ blog.title }}</h2>
  <small style="color: #888;">
    By <b>{{ getUsername(blog.userId) }}</b> | {{ blog.createdAt | date }}
  </small>
  <p>{{ blog.description }}</p>
  <div *ngIf="blog.images?.length > 0">
    <img *ngFor="let img of blog.images" [src]="img" width="300" style="margin-right: 8px; border-radius: 4px;" />
  </div>

  <hr />

  <h3>Comments</h3>

  <div *ngIf="comments.length === 0"><i>No comments yet.</i></div>

  <div *ngFor="let c of comments" style="margin-bottom: 8px; padding: 8px; background: #f5f5f5; border-radius: 4px;">
    <b>{{ getUsername(c.userId) }}</b>: {{ c.content }}
  </div>

  <div *ngIf="canComment" style="margin-top: 16px;">
    <textarea
      [(ngModel)]="newComment"
      rows="3"
      cols="50"
      placeholder="Write a comment...">
    </textarea>
    <br />
    <button (click)="submitComment()">Post Comment</button>
    <p *ngIf="errorMsg" style="color: red;">{{ errorMsg }}</p>
  </div>

  <p *ngIf="!canComment" style="color: gray;">
    Follow this user to leave a comment.
  </p>
</div>
