version: "3.7"
services:
  stakeholders-service:
    build: 
      context: ./Backend/Stakeholders
      dockerfile: Dockerfile
    container_name: stakeholders
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - database
    networks:
      - app-network

  database:
    image: postgres:16
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: tourist_app
    ports:
      - "5432:5432"
    networks:
      - app-network
    volumes:
      - database-data:/var/lib/postgresql/data

  blogs-service:
    build:
      context: ./Backend/Blogs
      dockerfile: Blogs.API/Dockerfile
    container_name: blogs
    restart: no
    ports:
      - "8081:8080"
    depends_on:
      - blogs-database
    environment:
      - ConnectionStrings__DefaultConnection=Host=blogs-database;Database=blogs_db;Username=postgres;Password=root
    networks:
      - app-network

  blogs-database:
    image: postgres:16
    container_name: blogs-db
    restart: no
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: blogs_db
    ports:
      - "5433:5432"
    networks:
      - app-network
    volumes:
      - blogs-database-data:/var/lib/postgresql/data

  followers-service:
    build:
      context: ./Backend/Followers/follower-service
      dockerfile: Dockerfile
    container_name: followers
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      - neo4j-db
    environment:
      SPRING_NEO4J_URI: bolt://neo4j-db:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: password
    networks:
      - app-network

  tours-service:
    build:
      context: ./Backend/Tours/tour-service
      dockerfile: Dockerfile
    container_name: tours
    restart: always
    ports:
      - "8083:8083"
    depends_on:
      - tours-neo4j
    environment:
      SPRING_NEO4J_URI: bolt://tours-neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: notverysecret
    networks:
      - app-network

  frontend:
    build: ./Frontend/tourist-app-front
    container_name: frontend
    ports:
      - "4200:4200"
    networks:
      - app-network
  
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - app-network
    volumes:
      - pgadmin-data:/var/lib/pgadmin 

  neo4j-db:
    image: neo4j
    container_name: neo4j-db
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    networks:
      - app-network
    volumes:
      - neo4j-data:/data

  tours-neo4j:
    image: 'neo4j:latest'
    container_name: tours-neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/notverysecret
    ports:
      - '7475:7474'
      - '7688:7687'
    networks:
      - app-network
    volumes:
    - tours-neo4j-data:/data

volumes:
  database-data:
    name: server-database
  blogs-database-data:
    name: blogs-database
  pgadmin-data:
    name: pgadmin-data
  neo4j-data:
    name: neo4j-data
  tours-neo4j-data:
    name: tours-neo4j-data

networks:
  app-network:
    driver: bridge