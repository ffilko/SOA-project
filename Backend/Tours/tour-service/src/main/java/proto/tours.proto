syntax = "proto3";

package tour;

option java_multiple_files = true;
option java_package = "com.tours.tour_service.grpc";
option java_outer_classname = "TourProto";

service TourGrpcService {
  rpc GetTourForPurchase(GetTourRequest)
      returns (TourPurchaseResponse);
}

message GetTourRequest {
  string tourId = 1;
}

message TourPurchaseResponse {
  string id = 1;
  string name = 2;
  double price = 3;
  string status = 4;
}